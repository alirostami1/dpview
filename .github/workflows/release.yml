name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          short_commit="$(printf '%s' "$COMMIT" | cut -c1-7)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version_no_v="${VERSION#v}"
          binary_name="dpview"
          if [ "$GOOS" = "windows" ]; then
            binary_name="dpview.exe"
          fi

          dist_dir="dist"
          stage_dir="${dist_dir}/dpview_${version_no_v}_${GOOS}_${GOARCH}"
          mkdir -p "$stage_dir"

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${short_commit} -X main.date=${build_date}" \
            -o "${stage_dir}/${binary_name}" \
            ./cmd/dpview

          cp README.md "$stage_dir/"
          cp LICENSE "$stage_dir/" 2>/dev/null || true

          archive_base="dpview_${version_no_v}_${GOOS}_${GOARCH}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd "$dist_dir"
              zip -r "${archive_base}.zip" "$(basename "$stage_dir")"
            )
          else
            tar -C "$dist_dir" -czf "${dist_dir}/${archive_base}.tar.gz" "$(basename "$stage_dir")"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dpview-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
